version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bball
      POSTGRES_PASSWORD: bball
      POSTGRES_DB: bball
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/bball-videos --ignore-existing;
      mc anonymous set download local/bball-videos;
      exit 0;
      "

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bball:bball@postgres:5432/bball
      DATABASE_URL_SYNC: postgresql://bball:bball@postgres:5432/bball
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: bball-videos
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:-}
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://bball:bball@postgres:5432/bball
      DATABASE_URL_SYNC: postgresql://bball:bball@postgres:5432/bball
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: bball-videos
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:-}
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app worker --loglevel=info

volumes:
  pgdata:
  miniodata:
